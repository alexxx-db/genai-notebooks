# PII detection profiling -- multi-model sweep on a single A100 node.
# Each task runs the same notebook with a different model_id parameter.
# Tasks run sequentially because only one model fits in GPU memory at a time.
#
# Deploy:  databricks bundle deploy -t dev
# Run:     databricks bundle run -t dev pii_profiling_job

resources:
  jobs:
    pii_profiling_job:
      name: "[vLLM] PII detection profiling (multi-model)"
      job_clusters:
        - job_cluster_key: a100_single_node
          new_cluster:
            spark_version: "16.4.x-ml-scala2.12"
            node_type_id: "Standard_NC24ads_A100_v4"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"
      tasks:
        - task_key: qwen3_4b
          job_cluster_key: a100_single_node
          notebook_task:
            notebook_path: ../vllm/pii_detection_profiling.ipynb
            base_parameters:
              model_id: "Qwen/Qwen3-4B"
              num_rows: "500"
              max_tokens: "500"
              output_catalog: "shm"
              output_schema: "default"
          timeout_seconds: 3600

        - task_key: qwen3_8b
          depends_on:
            - task_key: qwen3_4b
          job_cluster_key: a100_single_node
          notebook_task:
            notebook_path: ../vllm/pii_detection_profiling.ipynb
            base_parameters:
              model_id: "Qwen/Qwen3-8B"
              num_rows: "500"
              max_tokens: "500"
              output_catalog: "shm"
              output_schema: "default"
          timeout_seconds: 3600

        - task_key: qwen3_14b
          depends_on:
            - task_key: qwen3_8b
          job_cluster_key: a100_single_node
          notebook_task:
            notebook_path: ../vllm/pii_detection_profiling.ipynb
            base_parameters:
              model_id: "Qwen/Qwen3-14B"
              num_rows: "500"
              max_tokens: "500"
              output_catalog: "shm"
              output_schema: "default"
          timeout_seconds: 3600
