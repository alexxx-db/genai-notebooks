# Vector Search filter test -- demonstrates filter-only queries with
# self-managed vs managed embeddings.
#
# Deploy:  databricks bundle deploy -t dev
# Run:     databricks bundle run -t dev vs_filter_test_job
#
# Task 1 reproduces the customer's issue (self-managed embeddings).
# Task 2 shows the managed embedding solution.
# Both run on serverless compute (no GPU needed).

resources:
  jobs:
    vs_filter_test_job:
      name: "[Vector Search] Filter query test (self-managed vs managed)"
      tasks:
        - task_key: self_managed
          notebook_task:
            notebook_path: ../vector_search/01_self_managed_filter_test.py
          timeout_seconds: 1800

        - task_key: managed_embedding
          depends_on:
            - task_key: self_managed
          notebook_task:
            notebook_path: ../vector_search/02_managed_embedding_filter_test.py
          timeout_seconds: 1800
